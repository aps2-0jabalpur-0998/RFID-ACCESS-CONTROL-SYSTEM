<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoGuardian AI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
--bg:#0a0a0f;
--surface:#111118;
--surface2:#1a1a24;
--border:rgba(255,255,255,0.07);
--text:#f0f0f5;
--muted:#6b6b80;
--accent:#e05a1e;
--safe:#22c55e;
--danger:#ef4444;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
background:var(--bg);
color:var(--text);
font-family:'Syne',sans-serif;
padding:2rem;
}

.wrapper{
max-width:1200px;
margin:auto;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.logo{
font-size:2rem;
font-weight:800;
}

.logo span{
color:var(--accent);
}

.system-status{
padding:12px 20px;
border-radius:30px;
background:rgba(34,197,94,.1);
border:1px solid var(--safe);
color:var(--safe);
font-family:'Space Mono';
}

.system-status.alert-mode{
background:rgba(239,68,68,.1);
border:1px solid var(--danger);
color:var(--danger);
}

.ws-bar{
padding:14px;
background:var(--surface);
border:1px solid var(--border);
border-radius:10px;
margin-bottom:25px;
font-family:'Space Mono';
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-bottom:30px;
}

.zone-card{
background:var(--surface);
padding:20px;
border-radius:15px;
border:1px solid var(--border);
}

.zone-card.alert{
border-color:var(--danger);
background:#1a0f0f;
}

.zone-label{
font-size:12px;
color:var(--muted);
margin-bottom:10px;
}

.zone-name{
font-size:20px;
font-weight:700;
margin-bottom:15px;
}

.sensor-status{
padding:10px;
border-radius:10px;
background:var(--surface2);
color:var(--safe);
}

.sensor-status.alert{
background:rgba(239,68,68,.08);
color:var(--danger);
}

.history-card{
background:var(--surface);
border-radius:15px;
overflow:hidden;
}

.card-head{
padding:20px;
font-weight:700;
border-bottom:1px solid var(--border);
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:15px;
text-align:left;
font-family:'Space Mono';
}

th{
background:var(--surface2);
color:var(--muted);
}

.alertText{
color:var(--danger);
font-weight:700;
}

.zone-badge{
padding:5px 10px;
border-radius:20px;
border:1px solid var(--danger);
color:var(--danger);
}

.empty-state{
padding:40px;
text-align:center;
color:var(--muted);
}

@media(max-width:900px){
.grid{
grid-template-columns:1fr 1fr;
}
}
</style>
</head>

<body>

<div class="wrapper">

<header>
<div class="logo">
ECOGUARDIAN <span>AI</span>
</div>

<div class="system-status" id="systemStatus">
<span id="statusText">ALL SYSTEMS SAFE</span>
</div>
</header>

<div class="ws-bar" id="wsLabel">
DISCONNECTED
</div>

<h3>ZONE STATUS</h3>
<br>

<div class="grid">

<div class="zone-card" id="cardA">
<div class="zone-label">ZONE A</div>
<div class="zone-name">IR Sensor 1</div>
<div class="sensor-status" id="zoneA">SAFE — No Detection</div>
</div>

<div class="zone-card" id="cardC">
<div class="zone-label">ZONE C</div>
<div class="zone-name">Flame Sensor 1</div>
<div class="sensor-status" id="zoneC">SAFE — No Detection</div>
</div>

<div class="zone-card" id="cardD">
<div class="zone-label">ZONE D</div>
<div class="zone-name">Flame Sensor 2</div>
<div class="sensor-status" id="zoneD">SAFE — No Detection</div>
</div>

</div>

<h3>DETECTION HISTORY</h3>
<br>

<div class="history-card">

<div class="card-head">
Alert Log
</div>

<table>
<thead>
<tr>
<th>SENSOR</th>
<th>ZONE</th>
<th>TIME</th>
<th>DATE</th>
</tr>
</thead>

<tbody id="historyBody">
<tr>
<td colspan="4" class="empty-state">
No alerts yet — system nominal
</td>
</tr>
</tbody>

</table>

</div>

</div>

<script>
const historyBody = document.getElementById("historyBody");
let hasHistory = false;

function setSafe(){
document.getElementById("systemStatus").className="system-status";
document.getElementById("statusText").innerText="ALL SYSTEMS SAFE";

["A","B","C","D"].forEach(z=>{
document.getElementById("card"+z).classList.remove("alert");
document.getElementById("zone"+z).className="sensor-status";
document.getElementById("zone"+z).innerText="SAFE — No Detection";
});
}

function triggerAlert(sensor,zone){

document.getElementById("systemStatus").className="system-status alert-mode";
document.getElementById("statusText").innerText="⚠ FIRE DETECTED";

zone = zone.toString().trim().toUpperCase();

const card = document.getElementById("card"+zone);
const sensorBox = document.getElementById("zone"+zone);

if(card){
    card.classList.add("alert");
}

if(sensorBox){
    sensorBox.className="sensor-status alert";
    sensorBox.innerText=sensor + " ACTIVE";
}

console.log("LIVE ALERT:", zone, sensor);
}

function addHistory(sensor,zone,time,date){
if(!hasHistory){
historyBody.innerHTML="";
hasHistory=true;
}

const row=document.createElement("tr");

row.innerHTML=`
<td class="alertText">${sensor}</td>
<td><span class="zone-badge">ZONE ${zone}</span></td>
<td>${time}</td>
<td>${date}</td>
`;

historyBody.prepend(row);
}

function connect(){

const ws=new WebSocket("wss://nacho-plunder-oblivion.ngrok-free.dev");

ws.onopen=()=>{
document.getElementById("wsLabel").innerText="CONNECTED — LIVE SERVER";
};

ws.onclose=()=>{
document.getElementById("wsLabel").innerText="DISCONNECTED — RETRYING...";
setTimeout(connect,3000);
};

ws.onmessage=(event)=>{
const data=JSON.parse(event.data);

console.log(data);

if(data.type==="safe"){
setSafe();
}

if(data.type==="alert"){
data.alerts.forEach(a=>{
triggerAlert(a.sensor,a.zone);
addHistory(a.sensor,a.zone,a.time,a.date);
});
}

if(data.type==="history"){
data.data.forEach(h=>{
addHistory(h.sensor,h.zone,h.time,h.date);
});
}
};

}

connect();
</script>

</body>
</html>
